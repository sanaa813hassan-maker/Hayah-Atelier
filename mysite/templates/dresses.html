{% extends "layout.html" %}
{% block content %}
<div class="fade-in">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin: 0;">كتالوج الفساتين</h2>
        {% if is_manager %}
        <a href="{{ url_for('add_dress') }}" class="btn btn-primary" style="width: auto; padding: 8px 15px;"><i class="fa-solid fa-plus"></i></a>
        {% endif %}
    </div>
    <div class="glass-card" style="padding: 10px;">
        <form method="GET" action="{{ url_for('dresses') }}" style="display: flex; align-items: center;">
            <input type="text" name="query" placeholder="بحث..." value="{{ search_query if search_query }}" style="background: transparent; border: none; color: white; width: 100%;">
        </form>
    </div>

    <div class="app-grid">
        {% for dress in dresses %}
        <div class="glass-card" style="padding: 10px; overflow: hidden; margin: 0;">
            <div style="width: 100%; aspect-ratio: 3/4; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 10px; position: relative;">
                {% if dress.image %}
                    <img src="{{ url_for('static', filename='dress_images/' + dress.image) }}" style="width: 100%; height: 100%; object-fit: cover;">
                {% else %}
                    <div style="display: flex; height: 100%; align-items: center; justify-content: center;"><i class="fa-solid fa-shirt" style="font-size: 40px; opacity: 0.5;"></i></div>
                {% endif %}
                <div onclick="openQrModal('qr-{{ loop.index }}', '{{ dress.dress_name }} | {{ dress.base_price }}')"
                     style="position: absolute; bottom: 5px; right: 5px; background: white; padding: 4px; border-radius: 6px; cursor: pointer;">
                    <i class="fa-solid fa-qrcode" style="color: black; font-size: 20px;"></i>
                </div>
            </div>
            <h4 style="margin: 5px 0; font-size: 14px;">{{ dress.dress_name }}</h4>
            <p style="color: #888; font-size: 12px;">{{ dress.base_price }} ج</p>
            {% if is_manager %}
            <div style="display: flex; gap: 5px; margin-top: 10px;">
                <a href="{{ url_for('edit_dress', dress_id=dress.dress_id) }}" class="btn" style="background: rgba(255,255,255,0.1); padding: 8px; margin-top:0;"><i class="fa-solid fa-pen"></i></a>
                <form action="{{ url_for('delete_dress', dress_id=dress.dress_id) }}" method="POST" style="flex:1;" onsubmit="return confirm('حذف؟')">
                    <button class="btn btn-danger" style="padding: 8px; margin-top:0;"><i class="fa-solid fa-trash"></i></button>
                </form>
            </div>
            {% endif %}
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
