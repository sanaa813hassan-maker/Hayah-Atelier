{% extends "layout.html" %}

{% block title %}تأكيد الحذف{% endblock %}

{% block content %}
<div class="fade-in d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="custom-card text-center shadow-lg" style="max-width: 450px; border-top: 5px solid #FF453A;">
        <div class="custom-card-body">
            <i class="fa-solid fa-triangle-exclamation fa-3x text-danger mb-3"></i>
            <h2 class="mb-3">تأكيد حذف نهائي</h2>
            <p class="text-muted">
                أنت على وشك حذف الموظف/الشريك:
                <strong class="d-block mt-2 mb-2">{{ employee_name }}</strong>
                هذا الإجراء سيقوم بحذف كل السجلات المرتبطة به ولا يمكن التراجع عنه.
            </p>

            <form method="POST" class="mt-4">
                <div class="form-group">
                    <label for="password">لتأكيد الحذف، يرجى إدخال كلمة مرور المدير:</label>
                    <input type="password" id="password" name="password" class="form-control text-center" required placeholder="••••••••">
                </div>

                <div class="d-flex justify-content-center mt-4">
                    <a href="{{ url_for('employee_report') }}" class="btn btn-secondary ml-2">إلغاء والعودة</a>
                    <button type="submit" class="btn btn-danger">أنا متأكد، قم بالحذف</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
