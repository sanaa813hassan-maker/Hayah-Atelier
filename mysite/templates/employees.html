{% extends "base.html" %}

{% block title %}إدارة الموظفين{% endblock %}

{% block content %}
<div class="container mt-4 text-center">
    <h2 class="mb-4">قسم إدارة الموظفين</h2>
    <p class="lead mb-5">اختر الإجراء المطلوب.</p>

    <div class="d-flex justify-content-center flex-wrap">
        <a href="{{ url_for('employee_report') }}" class="btn btn-primary btn-lg m-2" style="width: 250px; padding: 20px;">
            <i class="fas fa-file-alt mr-2"></i> تقرير الموظفين
        </a>
        <a href="{{ url_for('add_employee') }}" class="btn btn-success btn-lg m-2" style="width: 250px; padding: 20px;">
            <i class="fas fa-user-plus mr-2"></i> إضافة موظف جديد
        </a>
        <a href="{{ url_for('manage_attendance') }}" class="btn btn-info btn-lg m-2" style="width: 250px; padding: 20px;">
            <i class="fas fa-calendar-check mr-2"></i> تسجيل الحضور والغياب
        </a>
        <a href="{{ url_for('add_payment') }}" class="btn btn-warning btn-lg m-2" style="width: 250px; padding: 20px; color: #fff;">
            <i class="fas fa-money-bill-wave mr-2"></i> صرف راتب
        </a>
         <a href="{{ url_for('add_deduction') }}" class="btn btn-danger btn-lg m-2" style="width: 250px; padding: 20px;">
            <i class="fas fa-minus-circle mr-2"></i> تسجيل خصم
        </a>
        <a href="{{ url_for('add_withdrawal') }}" class="btn btn-dark btn-lg m-2" style="width: 250px; padding: 20px;">
            <i class="fas fa-wallet mr-2"></i> مسحوبات المالك
        </a>
    </div>

    <div class="mt-5">
        <a href="{{ url_for('index') }}" class="btn btn-secondary">العودة للرئيسية</a>
    </div>
</div>
{% endblock %}
