{% extends "layout.html" %}

{% block content %}
<div class="fade-in">
    <h2 style="text-align: center; margin-bottom: 20px;">أرباح الفساتين</h2>

    <div class="glass-card" style="padding: 10px; margin-bottom: 20px;">
        <form method="GET" action="{{ url_for('dress_report') }}" style="display: flex; align-items: center; margin: 0;">
            <i class="fa-solid fa-magnifying-glass" style="color: var(--text-secondary); margin-left: 10px;"></i>
            <input type="text" name="query" placeholder="ابحث عن فستان..." value="{{ search_query if search_query }}" style="margin: 0; background: transparent; border: none; padding: 5px; color: white; width: 100%;">
        </form>
    </div>

    {% if dress_earnings|length == 0 %}
        <div style="text-align: center; margin-top: 50px; color: var(--text-secondary);">
            <p>لا توجد بيانات.</p>
        </div>
    {% else %}
        {% for dress_name, data in dress_earnings.items() %}
        <div class="glass-card" style="display: flex; justify-content: space-between; align-items: center; padding: 15px;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div style="width: 45px; height: 45px; background: rgba(255,255,255,0.05); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                    <i class="fa-solid fa-shirt" style="color: var(--accent-pink); font-size: 20px;"></i>
                </div>
                <div>
                    <h4 style="margin: 0 0 5px 0; font-size: 16px;">{{ dress_name }}</h4>
                    <div style="font-size: 12px; color: var(--text-secondary);">
                        <i class="fa-solid fa-repeat"></i> مرات: <strong>{{ data.count }}</strong>
                    </div>
                </div>
            </div>
            <div style="text-align: left;">
                <div style="font-size: 18px; font-weight: bold; color: var(--success);">
                    {{ data.total_revenue }} ج
                </div>
            </div>
        </div>
        {% endfor %}
    {% endif %}
</div>
{% endblock %}
