{% extends "layout.html" %}

{% block content %}
<div class="fade-in">
    <h1 style="text-align: center; margin-bottom: 30px;">مركز التقارير</h1>

    <div class="app-grid">
        <a href="{{ url_for('profit_report') }}" class="app-icon-card">
            <div style="color: #FF9F0A;"><i class="fa-solid fa-sack-dollar"></i></div>
            <span style="margin-top:10px; font-size:14px;">صافي الربح</span>
        </a>

        <a href="{{ url_for('income_report') }}" class="app-icon-card">
            <div style="color: #30D158;"><i class="fa-solid fa-chart-simple"></i></div>
            <span style="margin-top:10px; font-size:14px;">الإيرادات</span>
        </a>

        <a href="{{ url_for('dress_report') }}" class="app-icon-card">
            <div style="color: #BF5AF2;"><i class="fa-solid fa-shirt"></i></div>
            <span style="margin-top:10px; font-size:14px;">أرباح الفساتين</span>
        </a>

        <a href="{{ url_for('employee_report') }}" class="app-icon-card">
            <div style="color: #0A84FF;"><i class="fa-solid fa-users"></i></div>
            <span style="margin-top:10px; font-size:14px;">الموظفين</span>
        </a>

        <a href="{{ url_for('dresses') }}" class="app-icon-card">
            <div style="color: #FFD60A;"><i class="fa-solid fa-tags"></i></div>
            <span style="margin-top:10px; font-size:14px;">الكتالوج</span>
        </a>

        <a href="{{ url_for('expenses_list') }}" class="app-icon-card">
            <div style="color: #FF453A;"><i class="fa-solid fa-receipt"></i></div>
            <span style="margin-top:10px; font-size:14px;">المصروفات</span>
        </a>

</div>
