{% extends "layout.html" %}

{% block content %}
<div class="fade-in">
    <h2 style="text-align: center; margin-bottom: 20px;">إضافة فستان جديد</h2>

    <form method="POST" enctype="multipart/form-data">
        <div class="glass-card">

            <label class="text-muted">صورة الفستان</label>
            <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 15px; border: 2px dashed var(--text-secondary); position: relative;">
                <i class="fa-solid fa-camera" style="font-size: 30px; color: var(--text-secondary); margin-bottom: 10px;"></i>
                <p style="font-size: 12px; color: white; margin: 0;">اضغط لاختيار صورة</p>
                <input type="file" name="dress_image" accept="image/*" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
            </div>

            <label class="text-muted">اسم الفستان</label>
            <input type="text" name="dress_name" placeholder="مثال: السندريلا بيج" required>

            <label class="text-muted">سعر التأجير الأساسي</label>
            <input type="number" name="base_price" placeholder="السعر..." required>
        </div>

        <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-check"></i> حفظ وإضافة للكتالوج
        </button>
    </form>
</div>
{% endblock %}
