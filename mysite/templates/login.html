{% extends "layout.html" %}

{% block content %}
<div style="min-height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">

    <div style="text-align: center; margin-bottom: 40px;">
        <div style="font-size: 60px; margin-bottom: 10px;">👗</div>
        <h1 style="font-size: 32px; margin: 0;">أهلاً بيك</h1>
        <p style="color: var(--text-secondary);">في سيستم أتيليه حياه</p>
    </div>

    <div class="glass-card" style="width: 100%; max-width: 350px; padding: 30px;">
        <form method="POST">
            <div style="position: relative; margin-bottom: 15px;">
                <i class="fa-solid fa-user" style="position: absolute; right: 15px; top: 15px; color: var(--text-secondary);"></i>
                <input type="text" name="username" placeholder="اسم المستخدم" style="padding-right: 45px;" required>
            </div>

            <div style="position: relative; margin-bottom: 20px;">
                <i class="fa-solid fa-lock" style="position: absolute; right: 15px; top: 15px; color: var(--text-secondary);"></i>
                <input type="password" name="password" placeholder="كلمة المرور" style="padding-right: 45px;" required>
            </div>

            <button type="submit" class="btn btn-primary" style="background: linear-gradient(to right, var(--primary-color), var(--accent-pink));">
                تسجيل الدخول
            </button>
        </form>
    </div>

    <p style="margin-top: 30px; color: var(--text-secondary); font-size: 12px;">© 2025 HAYAH Atelier v22.0</p>
</div>

<style> .nav-island { display: none !important; } </style>
{% endblock %}
