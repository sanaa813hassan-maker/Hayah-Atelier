{% extends "layout.html" %}

{% block content %}
<div class="fade-in">
    <h2 style="text-align: center; margin-bottom: 20px;">تعديل بيانات الفستان</h2>

    <form method="POST" enctype="multipart/form-data">
        <div class="glass-card">

            {% if dress.image %}
            <div style="text-align: center; margin-bottom: 15px;">
                <p class="text-muted">الصورة الحالية:</p>
                <img src="{{ url_for('static', filename='dress_images/' + dress.image) }}" style="max-width: 150px; border-radius: 10px; border: 2px solid var(--primary-color);">
            </div>
            {% endif %}

            <label class="text-muted">تغيير الصورة (اختياري)</label>
            <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; border: 2px dashed var(--text-secondary); position: relative;">
                <i class="fa-solid fa-camera" style="color: var(--text-secondary);"></i>
                <span style="font-size: 12px; color: white;"> اضغط لتغيير الصورة</span>
                <input type="file" name="dress_image" accept="image/*" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
            </div>

            <label class="text-muted">اسم الفستان</label>
            <input type="text" name="dress_name" value="{{ dress.dress_name }}" required>

            <label class="text-muted">السعر الأساسي</label>
            <input type="number" name="base_price" value="{{ dress.base_price }}" required>

            <label class="text-muted">الحالة</label>
            <select name="status">
                <option value="متاح" {% if dress.status == 'متاح' %}selected{% endif %}>متاح ✅</option>
                <option value="محجوز" {% if dress.status == 'محجوز' %}selected{% endif %}>محجوز 🚫</option>
                <option value="صيانة" {% if dress.status == 'صيانة' %}selected{% endif %}>في الصيانة 🛠️</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">حفظ التعديلات</button>
    </form>
</div>
{% endblock %}
