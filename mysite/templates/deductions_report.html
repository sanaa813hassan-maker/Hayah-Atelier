{% extends "layout.html" %}

{% block content %}
<div class="fade-in">
    <h2 style="text-align: center; margin-bottom: 20px;">تفاصيل خصومات: {{ employee_name }}</h2>

    <div class="glass-card" style="text-align: center; border: 1px solid var(--danger);">
        <span class="text-muted">إجمالي الخصومات</span>
        <h1 style="color: var(--danger); margin: 10px 0;">{{ total }} ج</h1>
    </div>

    {% for ded in deductions %}
    <div class="glass-card" style="padding: 15px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
            <span style="font-weight: bold; color: var(--danger);">{{ ded.amount }} ج</span>
            <span class="text-muted">{{ ded.date }}</span>
        </div>
        <p style="margin: 0; font-size: 14px;">السبب: {{ ded.reason }}</p>
    </div>
    {% endfor %}

    <div style="text-align: center; margin-top: 20px;">
        <a href="{{ url_for('employee_report') }}" class="btn btn-primary" style="width: auto;">عودة للتقرير الشامل</a>
    </div>
</div>
{% endblock %}
