{% extends "base.html" %}

{% block title %}إضافة حجز جديد{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="text-center">إضافة حجز جديد</h2>
    <form action="{{ url_for('add_rental') }}" method="POST" class="text-right mt-4">
        <div class="form-group">
            <label for="client_name">اسم العميل</label>
            <input type="text" class="form-control" id="client_name" name="client_name" required>
        </div>
        <div class="form-group">
            <label for="phone">رقم الهاتف</label>
            <input type="text" class="form-control" id="phone" name="phone" required>
        </div>
        <div class="form-group">
            <label for="dress_name">اسم الفستان</label>
            <input list="dress-list" class="form-control" id="dress_name" name="dress_name" required>
            <datalist id="dress-list">
                {% for dress in dresses %}
                    <option value="{{ dress }}">
                {% endfor %}
            </datalist>
        </div>
        <div class="form-group">
            <label for="total_price">السعر الإجمالي</label>
            <input type="number" class="form-control" id="total_price" name="total_price" required>
        </div>
        <div class="form-group">
            <label for="paid_amount">المبلغ المدفوع</label>
            <input type="number" class="form-control" id="paid_amount" name="paid_amount" required>
        </div>
        <div class="form-group">
            <label for="due_date">تاريخ التسليم</label>
            <input type="date" class="form-control" id="due_date" name="due_date" required>
        </div>
        <div class="form-group">
            <label for="employee_name">اسم الموظف</label>
            <select class="form-control" id="employee_name" name="employee_name" required>
                {% for emp in employees %}
                    <option value="{{ emp }}">{{ emp }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary mt-3">إضافة الحجز</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary mt-3">إلغاء</a>
    </form>
</div>
{% endblock %}
