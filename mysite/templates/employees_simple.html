{% extends "base_simple.html" %}

{% block title %}إدارة الموظفين{% endblock %}

{% block content %}
<div class="text-center">
    <h2>إدارة الموظفين</h2>
    <a href="{{ url_for('add_employee') }}" class="btn btn-success mb-3">إضافة موظف جديد</a>
</div>

<table class="table table-striped table-bordered text-right">
    <thead class="thead-dark">
        <tr>
            <th>اسم الموظف</th>
            <th>إجراءات</th>
        </tr>
    </thead>
    <tbody>
        {% for employee in employees %}
        <tr>
            <td>{{ employee.name }}</td>
            <td>
                <form action="{{ url_for('delete_employee', emp_id=employee.id) }}" method="POST" style="display:inline-block;">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('هل أنت متأكد من حذف هذا الموظف؟');">حذف</button>
                </form>
            </td>
        </tr>
        {% else %}
        <tr>
            <td colspan="2" class="text-center">لا يوجد موظفين حاليًا.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<div class="text-center mt-4">
    <a href="{{ url_for('index') }}" class="btn btn-secondary">العودة للرئيسية</a>
</div>
{% endblock %}
